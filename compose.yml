name: gpthub-tools

x-backend: &backend
  image: gpthub-tools-backend:${APP_VERSION:-dev}
  build:
    context: ./backend
  env_file:
    - path: .env
      required: false
  environment: &backend-env
    REDIS_URL: redis://redis:6379/0
    JOBS_ROOT: /data/jobs
    PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:9080}
    APP_SECRET: ${APP_SECRET:-local-development-secret-change-me}
    APP_VERSION: ${APP_VERSION:-dev}
    UPSCALE_URL: ${UPSCALE_URL:-https://api.gpthub.ru/upscale}
    BACKGROUND_URL: ${BACKGROUND_URL:-https://api.gpthub.ru/bgr1/process}
    CLAMAV_HOST: clamav
    CLAMAV_REQUIRED: ${CLAMAV_REQUIRED:-true}
    MAX_ACTIVE_JOBS_PER_IP: ${MAX_ACTIVE_JOBS_PER_IP:-3}
  volumes:
    - ./data/jobs:/data/jobs
  networks:
    - internal
  restart: unless-stopped
  read_only: true
  tmpfs:
    - /tmp:size=512m,mode=1777
  security_opt:
    - no-new-privileges:true

services:
  gateway:
    image: gpthub-tools-gateway:${APP_VERSION:-dev}
    build:
      context: ./frontend
    ports:
      - "127.0.0.1:${GATEWAY_PORT:-9080}:8080"
    networks:
      - internal
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /var/cache/nginx:size=32m
      - /var/run:size=4m
      - /tmp:size=8m
    security_opt:
      - no-new-privileges:true
    mem_limit: 128m
    cpus: 0.5

  api:
    <<: *backend
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--proxy-headers", "--forwarded-allow-ips", "*"]
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 20s
      timeout: 5s
      retries: 12
      start_period: 20s
    mem_limit: 768m
    cpus: 1.0

  worker-local-1: &local-worker
    <<: *backend
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      <<: *backend-env
      ARQ_QUEUE: local
      WORKER_CONCURRENCY: 1
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    mem_limit: 2g
    cpus: 1.5

  worker-local-2:
    <<: *local-worker

  worker-ai-1: &ai-worker
    <<: *backend
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      <<: *backend-env
      ARQ_QUEUE: ai
      WORKER_CONCURRENCY: 1
    depends_on:
      redis:
        condition: service_healthy
      clamav:
        condition: service_healthy
    mem_limit: 1g
    cpus: 0.75

  worker-ai-2:
    <<: *ai-worker

  cleanup:
    <<: *backend
    command: ["python", "-m", "app.cleanup"]
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 256m
    cpus: 0.25

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no", "--maxmemory", "128mb", "--maxmemory-policy", "allkeys-lru"]
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    read_only: true
    tmpfs:
      - /data:size=128m
    security_opt:
      - no-new-privileges:true
    mem_limit: 192m
    cpus: 0.25

  clamav:
    image: clamav/clamav:1.4
    environment:
      CLAMD_CONF_MaxFileSize: 110M
      CLAMD_CONF_StreamMaxLength: 110M
      CLAMD_CONF_MaxScanSize: 260M
    networks:
      - internal
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --ping 1 >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    volumes:
      - clamav-db:/var/lib/clamav
    mem_limit: 1536m
    cpus: 1.0

networks:
  internal:
    internal: false

volumes:
  clamav-db:
